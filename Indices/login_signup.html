        <main class="content-area">

            <div id="login-panel" class="login-center active">
                <div class="form-box">
                    <h1 class="form-header">Login</h1>

                    <div class="form-properties">
                        <div class="form-group">
                            <label class="form-label">Account Username</label>
                            <input class="form-input" id="login-username" placeholder="Enter username here.">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input class="form-input" id="login-password" placeholder="Enter password here." type="password">
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="remember-me">
                            <label class="form-label">Remember me on this device</label>
                        </div>

                        <div class="form-options">
                            <button class="log-btn" data-target="sign-up-panel">New here? Sign up</button>
                            <button class="log-btn" data-target="change-password-panel">Forgot my password</button>
                        </div>
                
                        <p id="login-validation" class="validation-msg"></p>
                    </div>

                    <button class="form-submit-btn" onclick="VerifyLogin()">Login</button>
                </div>
            </div>
            

            <div id="sign-up-panel" class="login-center">
                <div class="form-box">
                    <h1 class="form-header">Sign Up</h1>

                    <div class="form-properties">
                        <div class="form-group">
                            <label class="form-label">Account Username</label>
                            <input class="form-input" id="new-username" placeholder="Enter username here.">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input class="form-input" id="new-email" placeholder="Enter email here.">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input class="form-input" id="password1" placeholder="Enter password here." type="password">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <input class="form-input" id="password2" placeholder="Enter password again here." type="password">
                        </div>

                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="TOS-Checkbox">
                            <label class="form-label">I agree to the <a href="#">Terms and Services</a></label>
                        </div>

                        <p id="sign-up-validation" class="validation-msg"></p>
                    </div>

                    <button class="form-submit-btn" onclick="VerifySignUp()">Sign Up</button>
                </div>
            </div>


            <div id="change-password-panel" class="login-center">
                <div class="form-box">
                    <h1 class="form-header">Change Password</h1>

                    <div class="form-properties">
                        <p class="change-password-dialogue" style="color: #C6C8F0; text-align: center; margin-bottom: 20px;">
                            To be able to change your password, you have to provide the email associated with your account.<br><br>
                            An email will be sent containing a link to change your password.
                        </p>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input class="form-input" id="change-password-email" placeholder="Enter email here.">
                        </div>

                        <p id="change-password-validation" class="validation-msg"></p>
                    </div>

                    <button class="form-submit-btn" onclick="VerifyChangePassword()">Submit</button>
                </div>
            </div>

        </main>
