    <main class="checkout-wrapper">
        <h1>Checkout</h1>

        <form action="#" method="POST" class="checkout-form">
            
            <div class="left-column">
                
                <div class="form-section">
                    <h2>Billing Details</h2>
                    
                    <div class="input-row">
                        <div class="input-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="first-name" required>
                        </div>
                        <div class="input-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="last-name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="country">Country</label>
                            <select id="country" name="country">
                                <option value="us">United States</option>
                                <option value="uk">United Kingdom</option>
                                <option value="eg">Egypt</option>
                                <option value="ca">Canada</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>Payment Information</h2>
                    
                    <div class="input-group">
                        <label for="name-on-card">Name on Card</label>
                        <input type="text" id="name-on-card" name="name-on-card" required>
                    </div>

                    <div class="input-group">
                        <label for="card-number">Card Number</label>
                        <input type="number" id="card-number" name="card-number" placeholder="0000 0000 0000 0000" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="expiry">Expiry Date</label>
                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>
                        </div>
                        <div class="input-group">
                            <label for="cvc">Security Code (CVC)</label>
                            <input type="number" id="cvc" name="cvc" placeholder="123" required>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <h2>Order Summary</h2>
                
                <div class="summary-item">
                    <span>Cyberpunk 2077</span>
                    <span>$59.99</span>
                </div>
                
                <div class="summary-item">
                    <span>Hollow Knight</span>
                    <span>$14.99</span>
                </div>

                <div class="summary-total">
                    <span>Total:</span>
                    <span>$74.98</span>
                </div>

                <button type="submit" class="btn-submit">Complete Purchase</button>
            </div>

        </form>
    </main>
