<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel = "stylesheet" href = "../CSS/style.css">
    <script src = "../Source/js_homepage.js"></script>

</head>

    <body>
        <nav>

                <div class="badge-pill">USERNAME</div>

            <div class="nav-center">

                <div class="logo">

                        <img src="../Images/Adobe Express - file.png" alt="Game Sphere Logo">
                    </a>
                </div>
            
            </div>

            <div class="nav-right">

                <button class="settings" >

                    </svg>
                </button>

                <button class="cart" >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </button>

                <button class="lib" >
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </button>

                <button class="hamburger-menu"> &#9776; </button>
                
            </div>

        </nav>

        <div class="slider-container">
    
            <button class="nav-btn prev-btn" onclick="moveSlide(-1)">&#10094;</button>

            <div class="slider-track" id="sliderTrack">

            <div class="slide">
                <img src = "../Images/GRIDBanner.jpg">
            </div>

            <div class="slide">
                <img src = "../Images/TOBanner.jpg">
            </div>
            <div class="slide">
                <img src = "../Images/SOSCBanner-1.jpg">
            </div>

            </div>

            <button class="nav-btn next-btn" onclick="moveSlide(1)">&#10095;</button>

        </div>

        <footer>

            <div>

              <button class="footer">About Us</button>
              <button class="footer">Privacy & Policies</button>
              <button class="footer">Support</button>

            </div>

        </footer>
    </body>
</html>
